<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
    }

    /* 좌측 프로필 */
    .sidebar {
      width: 260px;
      background: #f5f5f5;
      padding: 20px;
      height: 100vh;
      box-sizing: border-box;
    }

    .sidebar img {
      width: 120px;
      border-radius: 50%;
    }

    .sidebar h2 {
      margin: 10px 0 5px;
    }

    /* 오른쪽 내용 */
    .content {
      flex: 1;
      padding: 30px;
    }

    .section {
      margin-bottom: 30px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 15px;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 15px;
      transition: 0.2s;
    }

    .card:hover {
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

  <!-- 왼쪽 -->
  <div class="sidebar">
    <img src="profile.jpg" alt="profile">
    <h2>홍길동</h2>
    <p>Electrical Engineering</p>
    <p>Seoul</p>
    <p>email@example.com</p>
  </div>

  <!-- 오른쪽 -->
  <div class="content">

    <div class="section">
      <h1>Welcome</h1>
      <p>하드웨어 / AI 시스템 설계에 관심 있습니다.</p>
    </div>

    <div class="section">
      <h2>Projects</h2>
      <div class="cards">

        <div class="card">
          <h3>RISC-V CPU</h3>
          <p>RV32I 기반 CPU 설계</p>
        </div>

        <div class="card">
          <h3>FFT Accelerator</h3>
          <p>FPGA 기반 FFT 구현</p>
        </div>

        <div class="card">
          <h3>NPU Speculative Decoding</h3>
          <p>LLM inference 최적화</p>
        </div>

      </div>
    </div>

  </div>

</body>
</html>
